apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-defense-collector-config
  namespace: ai-defense
data:
  relay.yaml: |
    connectors:
      spanmetrics:
        aggregation_temporality: AGGREGATION_TEMPORALITY_CUMULATIVE
        dimensions:
        - default: GET
          name: http.method
        - name: http.status_code
        dimensions_cache_size: 1000
        events:
          dimensions:
          - name: exception.type
          - name: exception.message
          enabled: true
        exclude_dimensions: []
        exemplars:
          enabled: true
        histogram:
          explicit:
            buckets:
            - 100us
            - 1ms
            - 2ms
            - 6ms
            - 10ms
            - 100ms
            - 250ms
        metrics_expiration: 5m
        metrics_flush_interval: 15s
        resource_metrics_key_attributes:
        - service.name
        - telemetry.sdk.language
        - telemetry.sdk.name

    exporters:
      debug:
        verbosity: basic

      sapm/lab0:
        access_token: "${LAB0_ACCESS_TOKEN}"
        endpoint: https://private-ingest.lab0.signalfx.com/v2/trace
      sapm/rc0:
        access_token: "${RC0_ACCESS_TOKEN}"
        endpoint: https://private-ingest.rc0.signalfx.com/v2/trace

      signalfx/lab0:
        access_token: "${LAB0_ACCESS_TOKEN}"
        api_url: https://private-api.lab0.signalfx.com
        correlation: null
        ingest_url: https://private-ingest.lab0.signalfx.com
        send_otlp_histograms: true
        sync_host_metadata: true
      signalfx/rc0:
        access_token: "${RC0_ACCESS_TOKEN}"
        api_url: https://private-api.rc0.signalfx.com
        correlation: null
        ingest_url: https://private-ingest.rc0.signalfx.com
        send_otlp_histograms: true
        sync_host_metadata: true

      splunk_hec/lab0:
        disable_compression: true
        endpoint: https://bits.splunk.com:8088/services/collector/event
        index: o11y-for-ai-test-lab0
        profiling_data_enabled: false
        token: "${LAB0_HEC_TOKEN}"
      splunk_hec/rc0:
        disable_compression: true
        endpoint: https://bits.splunk.com:8088/services/collector/event
        index: o11y-for-ai-test-rc0
        profiling_data_enabled: false
        token: "${RC0_HEC_TOKEN}"

      otlphttp/entities/lab0:
        headers:
          X-SF-Token: "${LAB0_ACCESS_TOKEN}"
        logs_endpoint: https://private-ingest.lab0.signalfx.com/v3/event
      otlphttp/entities/rc0:
        headers:
          X-SF-Token: "${RC0_ACCESS_TOKEN}"
        logs_endpoint: https://private-ingest.rc0.signalfx.com/v3/event

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    processors:
      batch:
        metadata_keys:
        - X-SF-Token
      memory_limiter:
        check_interval: 2s
        limit_mib: 256
      resource:
        attributes:
        - action: upsert
          key: k8s.cluster.name
          value: o11y-for-ai
      resource/add_environment:
        attributes:
        - action: insert
          key: deployment.environment
          value: o11y-for-ai
      resourcedetection:
        detectors:
        - env
        - system
        override: true
        timeout: 15s

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    service:
      extensions:
      - health_check
      pipelines:
        logs:
          exporters:
          - splunk_hec/lab0
          - splunk_hec/rc0
          processors:
          - memory_limiter
          - batch
          - resourcedetection
          - resource
          - resource/add_environment
          receivers:
          - otlp
        logs/entities:
          exporters:
          - otlphttp/entities/lab0
          - otlphttp/entities/rc0
          processors:
          - memory_limiter
          - batch
          - resourcedetection
          - resource
          receivers:
          - otlp
        metrics:
          exporters:
          - signalfx/lab0
          - signalfx/rc0
          processors:
          - memory_limiter
          - batch
          - resourcedetection
          - resource
          receivers:
          - otlp
        metrics/spanmetrics:
          exporters:
          - signalfx/lab0
          - signalfx/rc0
          processors:
          - memory_limiter
          - batch
          receivers:
          - spanmetrics
        traces:
          exporters:
          - sapm/lab0
          - sapm/rc0
          - signalfx/lab0
          - signalfx/rc0
          - spanmetrics
          - debug
          processors:
          - memory_limiter
          - batch
          - resourcedetection
          - resource
          - resource/add_environment
          receivers:
          - otlp
