litellm_settings:
  callbacks: ["otel"]
  success_callback: ["otel"]
  failure_callback: ["otel"]

general_settings:
  master_key: sk-1234  # Change this to a secure key in production
  otel: true  # Enable OpenTelemetry logging
  # Optional: database_url can be set if using UI features
  # database_url: "postgresql://litellm_user:your_strong_password@localhost:5432/litellm_db"