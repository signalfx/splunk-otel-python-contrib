apiVersion: batch/v1
kind: CronJob
metadata:
  name: litellm-poem-generator
spec:
  suspend: false  
  schedule: " 0,30 16-23,0-2 * * 1-5"  # Every 30 min, 8am-6pm PST Mon-Fri (16:00-02:00 UTC)
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: litellm-poem-generator
          containers:
          - name: poem-generator
            image: python:3.11-slim
            env:
            - name: LITELLM_PROXY_URL
              value: "http://litellm.litellm-kdecker.svc.cluster.local:4000/v1"
            - name: LITELLM_TEAM_A_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_TEAM_A_KEY
            - name: LITELLM_TEAM_B_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_TEAM_B_KEY
            command:
            - /bin/sh
            - -c
            - |
              pip install openai --quiet && python3 << 'EOF'
              import os
              import random
              import openai
              from datetime import datetime

              # Team API keys from environment variables
              TEAM_KEYS = {
                  "team-a": os.getenv("LITELLM_TEAM_A_KEY", "sk-team-a-default"),
                  "team-b": os.getenv("LITELLM_TEAM_B_KEY", "sk-team-b-default"),
              }

              def get_random_team_key():
                  """Get a random team API key for load distribution."""
                  team = random.choice(list(TEAM_KEYS.keys()))
                  key = TEAM_KEYS[team]
                  return team, key

              def generate_poem_with_cisco():
                """Generate a poem using Cisco LLM via LiteLLM proxy with streaming."""
                team, api_key = get_random_team_key()
                
                client = openai.OpenAI(
                  api_key=api_key,
                  base_url=os.getenv("LITELLM_PROXY_URL", "http://localhost:4000/v1")
                )

                messages = [
                    {"role": "system", "content": "You are a poetic assistant, skilled in crafting beautiful poems about technical topics."},
                    {"role": "user", "content": "Write a short, creative poem about OpenTelemetry, the open-source observability framework. Focus on its ability to provide insights and visibility into distributed systems."}
                ]

                try:
                      response = client.chat.completions.create(
                        model="cisco-llm",
                        messages=messages,
                        stream=True
                      )
                      poem = ""
                      for chunk in response:
                        if chunk.choices[0].delta.content:
                          poem += chunk.choices[0].delta.content
                      return team, api_key, poem
                except Exception as e:
                      return team, api_key, f"Error generating poem with Cisco: {str(e)}"

              def main():
                  timestamp = datetime.utcnow().isoformat()
                  team, api_key, poem = generate_poem_with_cisco()
                  print(f"[{timestamp}] === OpenTelemetry Poetry Generator (via LiteLLM Proxy) ===")
                  print(f"[{timestamp}] Using {team} ({api_key[:10]}...)")
                  print(f"[{timestamp}] === Poem (Cisco) ===")
                  print(poem)
                  print(f"\n[{timestamp}] " + "="*50 + "\n")

              if __name__ == "__main__":
                  main()
              EOF
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "500m"
          restartPolicy: OnFailure
      backoffLimit: 2
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-poem-generator
