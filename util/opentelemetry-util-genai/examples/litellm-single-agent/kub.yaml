apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config-file
data:
  config.yaml: |
    model_list:
      - model_name: gpt-4.1
        litellm_params:
          model: gpt-4.1
          api_key: os.environ/OPENAI_API_KEY
    litellm_settings:
      callbacks: ["otel"]
      success_callback: ["otel"]
      failure_callback: ["otel"]

    general_settings:
      master_key: sk-1234  # Change this to a secure key in production
      otel: true  # Enable OpenTelemetry logging
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
spec:
  selector:
    app: litellm
  ports:
  - protocol: TCP
    port: 4000
    targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-deployment
  labels:
    app: litellm
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
      - name: litellm
        # image: docker.litellm.ai/berriai/litellm:main-stable 
        image: keitdeck245/kdecker-litellm:v1.81.0 # updates otel integration to 1.38
        args:
          - "--config"
          - "/app/proxy_server_config.yaml"
        ports:
        - containerPort: 4000
        env:
        - name: LITELLM_OTEL_INTEGRATION_ENABLE_METRICS
          value: "true"
        - name: LITELLM_OTEL_INTEGRATION_ENABLE_EVENTS
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "litellm-proxy-server"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=o11y-inframon-ai"
        - name: SPLUNK_OTEL_AGENT
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://$(SPLUNK_OTEL_AGENT):4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        volumeMounts:
        - name: config-volume
          mountPath: /app/proxy_server_config.yaml
          subPath: config.yaml
        envFrom:
        - secretRef:
            name: litellm-secrets
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config-file