# OTel Collector config for local development → Splunk O11y Cloud
#
# Usage:
#   export SPLUNK_ACCESS_TOKEN="<your-ingest-token>"
#   export SPLUNK_REALM="us1"
#   docker-compose -f .local/otelcol-docker-compose.yaml up
#
# App env vars:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
#   OTEL_EXPORTER_OTLP_PROTOCOL=grpc
#   OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=delta

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 512

exporters:
  # ── Splunk O11y Cloud – traces & logs (OTLP HTTP) ──────────────────────────
  otlphttp/splunk:
    traces_endpoint: https://ingest.${SPLUNK_REALM}.signalfx.com/v2/trace/otlp
    logs_endpoint: https://ingest.${SPLUNK_REALM}.signalfx.com/v3/event
    headers:
      X-SF-TOKEN: "${SPLUNK_ACCESS_TOKEN}"
    sending_queue:
      num_consumers: 8

  # ── Splunk O11y Cloud – metrics (SignalFx native format) ───────────────────
  # Preferred over otlphttp for metrics: translates OTel→SignalFx format
  # and handles trace/metric correlation automatically.
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    realm: "${SPLUNK_REALM}"
    # Preserve histogram bucket data so percentile/mean charts work in Splunk IMM.
    # IMPORTANT: Only works with the Splunk Distribution of the OTel Collector
    # (quay.io/signalfx/splunk-otel-collector). The upstream community signalfx
    # exporter does NOT support this flag. Requires Splunk Distro >= 0.98.
    # See: https://help.splunk.com/en/splunk-observability-cloud/manage-data/metrics-metadata-and-events/metrics-events-and-metadata/get-histogram-data-in
    send_otlp_histograms: true
    sending_queue:
      num_consumers: 8

  # ── Debug: log span/metric counts to stdout ────────────────────────────────
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/splunk, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [signalfx, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/splunk]
